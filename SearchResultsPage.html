<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results</title>
    <!-- 保持使用原来的 style.css -->
    <link rel="stylesheet" href="css/MainStyle.css">
    <link rel="stylesheet" href="css/article-list.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="AboutMe/aboutme.html">About Me</a></li>
                <li class="dropdown">
                    <a href="javascript:void(0);" class="dropbtn">Articles</a>
                    <ul class="dropdown-content">
                        <li><a href="Articles/Astronomy/_AstronomyMenu.html">Astronomy</a></li>
                        <li><a href="Articles/Physics/_PhysicsMenu.html">Physics</a></li>
                        <li><a href="Articles/Explorations/_ExplorationsMenu.html">Explorations</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 文章列表模块 -->
        <section class="article-list">
            <h1>Search Results</h1>
            <ul id="article-list-container">
                <!-- 搜索结果将在这里生成 -->
            </ul>
        </section>

        <!-- 侧边栏 -->
        <aside class="sidebar">
            <!-- Search 模块 -->
            <div class="search-container">
                <h3>Search</h3>
                <div class="search">
                    <form action="SearchResultsPage.html" method="GET" id="search-form">
                        <!-- 搜索选项 -->
                        <div class="search-options">
                            <label class="search-option">
                                <input type="radio" name="searchType" value="title" checked>
                                <span>Title</span>
                            </label>
                            <label class="search-option">
                                <input type="radio" name="searchType" value="tags">
                                <span>Tags</span>
                            </label>
                            <label class="search-option">
                                <input type="radio" name="searchType" value="content">
                                <span>Content</span>
                            </label>
                        </div>
                        <div class="search-input-group">
                            <input type="text" name="search" id="search-input" placeholder="Search articles..." />
                            <button type="submit">Search</button>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- Tags 模块 -->
            <div class="tags">
                <h3 class="tags-header">
                    Tags 
                </h3>
                <ul class="tags-list"></ul>
            </div>
        </aside>
    </div>

    <!-- 页脚 -->
    <footer>
        <p>&copy; 2024 Personal Blog. All rights reserved.</p>
    </footer>

    <!-- 引入独立的 JS 文件 -->
    <script src="js/script.js"></script>
    <script src="js/search.js"></script>
    <script src="js/tags.js"></script>
    <script src="js/recent-articles.js"></script>
</body>
</html>
